<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級作業看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f7;--bg2:#f2eeec;--bg3:#e8e2df;
  --surface:#ffffff;
  --text:#3d3530;--text2:#7a6e6a;--text3:#a89e9a;
  --border:rgba(61,53,48,0.1);--border2:rgba(61,53,48,0.2);
  --radius:8px;--radius-lg:13px;
  --rose:#c9a49a;--rose-light:#f0e6e3;--rose-dark:#8c6860;
  --mauve:#b8a3ab;--mauve-light:#ede6ea;--mauve-dark:#7d6870;
  --urgent:#c97a72;--urgent-light:#f5e3e1;
  --done-color:#7a9e7a;--done-light:#e6ece6;
  --sub-color:#9e7aa8;--sub-light:#ece6f0;
  --grey-light:#eae7e4;--grey-dark:#625d59;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#2a2420;--bg2:#322c28;--bg3:#3a3330;
    --surface:#2a2420;
    --text:#e8e0dc;--text2:#a89e9a;--text3:#7a6e6a;
    --border:rgba(232,224,220,0.1);--border2:rgba(232,224,220,0.2);
    --rose-light:#4a2e28;--rose-dark:#e8c4bc;
    --mauve-light:#3a2a32;--mauve-dark:#dcc8d2;
    --urgent-light:#4a1e1a;--urgent:#e09088;
    --done-light:#1a2e1a;--done-color:#9abf9a;
    --sub-light:#2e1e38;--sub-color:#c09acc;
    --grey-light:#2e2a28;--grey-dark:#c8c0bc;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.page{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:19px;font-weight:600;color:var(--text)}
.top-bar .sub{font-size:12px;color:var(--text2);margin-top:3px}
.top-bar-right{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer}
.btn:hover{background:var(--bg2)}
.btn-rose{border-color:var(--rose);color:var(--rose-dark);font-weight:500}
.btn-rose:hover{background:var(--rose-light)}
.btn-sm{padding:5px 10px;font-size:12px}
.admin-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--rose-light);border-radius:var(--radius);margin-bottom:1rem;font-size:12px;color:var(--rose-dark);border:1px solid rgba(201,164,154,0.3)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.stat-val{font-size:22px;font-weight:600}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fpill{padding:4px 12px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer}
.fpill.active{background:var(--surface);border-color:var(--rose);color:var(--rose-dark);font-weight:500}
.tag{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500;white-space:nowrap}
/* subject colours — Morandi */
.t-消費者行為{background:#f0e8e6;color:#7a5850}
.t-品質管理{background:#e6eaf0;color:#506078}
.t-策略管理{background:#e8e6f0;color:#605878}
.t-人際關係{background:#f0ece6;color:#786050}
.t-財務報表{background:#e6f0ec;color:#3d7060}
.t-總體經濟學{background:#eee6e6;color:#7a5858}
.t-金融市場實務{background:#e6eee8;color:#506058}
.t-婚姻與家庭{background:#ece6ee;color:#685878}
.t-default{background:var(--grey-light);color:var(--grey-dark)}
@media(prefers-color-scheme:dark){
  .t-消費者行為{background:#3a2220;color:#d4a49a}
  .t-品質管理{background:#1e2a38;color:#90aac4}
  .t-策略管理{background:#28223a;color:#a898cc}
  .t-人際關係{background:#3a2e20;color:#c8a070}
  .t-財務報表{background:#1e3028;color:#80bc9e}
  .t-總體經濟學{background:#362020;color:#cc8888}
  .t-金融市場實務{background:#203224;color:#80a888}
  .t-婚姻與家庭{background:#2e2038;color:#b090c0}
}
.tag-urgent{background:var(--urgent-light);color:var(--urgent)}
.tag-done{background:var(--done-light);color:var(--done-color)}
.tag-submitted{background:var(--sub-light);color:var(--sub-color)}
.tag-report{background:var(--mauve-light);color:var(--mauve-dark)}
.hw-list{display:flex;flex-direction:column;gap:8px}
.hw-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;display:grid;grid-template-columns:22px 1fr auto;gap:10px;align-items:start}
.hw-card:hover{border-color:var(--border2)}
.hw-card.urgent-card{border-left:3px solid var(--urgent)}
.hw-card.faded{opacity:.55}
.chk{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px;font-weight:700;color:white}
.chk.done{background:var(--done-color);border-color:var(--done-color)}
.chk.submitted{background:var(--sub-color);border-color:var(--sub-color)}
.chk.clickable{cursor:pointer}
.hw-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.4}
.hw-title.strike{text-decoration:line-through;color:var(--text2)}
.hw-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.countdown{font-size:12px;color:var(--text2)}
.countdown.urgent-text{color:var(--urgent);font-weight:500}
.hw-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
.hw-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.hw-card:hover .hw-actions{opacity:1}
.iBtn{width:26px;height:26px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.iBtn:hover{background:var(--bg2)}
.iBtn.del:hover{background:var(--urgent-light);color:var(--urgent)}
.empty{text-align:center;padding:2.5rem 0;color:var(--text2);font-size:14px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(40,30,26,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:380px;max-width:100%}
.modal h2{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.fg{margin-bottom:11px}
.fg label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--rose)}
textarea{height:60px;resize:vertical}
.cb-row{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text);cursor:pointer}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--rose)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.login-err{font-size:12px;color:var(--urgent);margin-top:4px;display:none}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <h1>📋 作業看板</h1>
      <div class="sub" id="updateTime"></div>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-sm" id="lockBtn" onclick="toggleAdmin()">🔓 登出</button>
      <button class="btn btn-sm btn-rose" id="addBtn" onclick="openAdd()">＋ 新增作業</button>
    </div>
  </div>
  <div class="admin-bar" id="adminBar">✏️ <span>管理者模式：可新增、編輯、刪除作業</span></div>
  <div class="stats">
    <div class="stat"><div class="stat-label">待繳</div><div class="stat-val" id="sPending">0</div></div>
    <div class="stat"><div class="stat-label">緊急（3天內）</div><div class="stat-val" id="sUrgent" style="color:var(--urgent)">0</div></div>
    <div class="stat"><div class="stat-label">已完成</div><div class="stat-val" id="sDone" style="color:var(--done-color)">0</div></div>
    <div class="stat"><div class="stat-label">已繳交</div><div class="stat-val" id="sSubmit" style="color:var(--sub-color)">0</div></div>
  </div>
  <div class="filters" id="filterRow"></div>
  <div class="hw-list" id="hwList"></div>
</div>

<!-- 新增/編輯 modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2 id="modalTitle">新增作業</h2>
    <div class="fg"><label>作業標題 *</label><input type="text" id="fTitle" placeholder="例：第三次作業"></div>
    <div class="frow">
      <div class="fg"><label>科目 *</label>
        <select id="fSubject">
          <option value="">選擇科目</option>
          <option>消費者行為</option>
          <option>品質管理</option>
          <option>策略管理</option>
          <option>人際關係</option>
          <option>財務報表</option>
          <option>總體經濟學</option>
          <option>金融市場實務</option>
          <option>婚姻與家庭</option>
        </select>
      </div>
      <div class="fg"><label>截止日期</label><input type="date" id="fDue"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>類型</label>
        <select id="fType"><option value="hw">作業</option><option value="report">報告</option></select>
      </div>
      <div class="fg"><label>狀態</label>
        <select id="fStatus">
          <option value="pending">待完成</option>
          <option value="ready">已寫完待繳</option>
          <option value="done">已完成</option>
          <option value="submitted">已繳交</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>備註（選填）</label><textarea id="fNote" placeholder="頁碼、注意事項..."></textarea></div>
    <div class="fg"><label class="cb-row"><input type="checkbox" id="fUrgent"> 標記為緊急</label></div>
    <div class="modal-foot">
      <button class="btn btn-sm" onclick="closeEdit()">取消</button>
      <button class="btn btn-sm btn-rose" onclick="saveHw()">儲存</button>
    </div>
  </div>
</div>

<!-- 登入 modal -->
<div class="overlay" id="loginOverlay">
  <div class="modal" style="width:280px">
    <h2>🔐 管理者登入</h2>
    <div class="fg"><label>密碼</label><input type="password" id="passInput" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="loginErr">密碼錯誤，請再試一次</div>
    <div class="modal-foot">
      <button class="btn btn-sm" onclick="closeLogin()">取消</button>
      <button class="btn btn-sm btn-rose" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<script>
const PASS="1234";
const SUBJECTS=["消費者行為","品質管理","策略管理","人際關係","財務報表","總體經濟學","金融市場實務","婚姻與家庭"];
let isAdmin=false,filter="all",editId=null,data=[],nid=1;

function fd(s){return s}
function days(s){if(!s)return 999;const n=new Date();n.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.round((d-n)/86400000)}
function cdText(n,s){if(!s)return"";if(n<0)return`已過期 ${-n} 天`;if(n===0)return"今天截止！";if(n===1)return"明天截止！";return`還有 ${n} 天`}
function sc(s){return SUBJECTS.includes(s)?`t-${s}`:"t-default"}
function save(){localStorage.setItem("hw_uni",JSON.stringify({data,nid}))}
function load(){
  const r=localStorage.getItem("hw_uni");
  if(r){const p=JSON.parse(r);data=p.data;nid=p.nid;return}
  // 初始資料
  data=[
    // 已繳交
    {id:nid++,title:"全數作業",subject:"消費者行為",due:"",type:"hw",status:"submitted",urgent:false,note:"全數繳交完成"},
    {id:nid++,title:"作業",subject:"品質管理",due:"",type:"hw",status:"submitted",urgent:false,note:""},
    {id:nid++,title:"作業",subject:"策略管理",due:"",type:"hw",status:"submitted",urgent:false,note:""},
    {id:nid++,title:"作業＋報告",subject:"人際關係",due:"",type:"report",status:"submitted",urgent:false,note:""},
    {id:nid++,title:"作業（1-7講）",subject:"財務報表",due:"",type:"hw",status:"submitted",urgent:false,note:""},
    {id:nid++,title:"第一次作業",subject:"總體經濟學",due:"",type:"hw",status:"submitted",urgent:false,note:""},
    {id:nid++,title:"第一次作業＋作業1-4講",subject:"金融市場實務",due:"",type:"hw",status:"submitted",urgent:false,note:"函p122-125（全抄）"},
    {id:nid++,title:"作業＋期中報告",subject:"婚姻與家庭",due:"",type:"report",status:"submitted",urgent:false,note:"已上傳資料夾"},
    // 已寫完待繳
    {id:nid++,title:"第二次作業（函授）",subject:"總體經濟學",due:"2026-04-22",type:"hw",status:"ready",urgent:true,note:"P.138第1題、P.139第3題、P.140第4題、P.144第9題"},
    {id:nid++,title:"作業5-7講",subject:"金融市場實務",due:"2026-04-22",type:"hw",status:"ready",urgent:true,note:"p.125-127"},
    // 待辦
    {id:nid++,title:"第三次作業（全寫）",subject:"策略管理",due:"2026-06-03",type:"hw",status:"pending",urgent:false,note:"分開裝訂"},
    {id:nid++,title:"第四次作業（14-18講，第1-3題）",subject:"策略管理",due:"2026-06-03",type:"hw",status:"pending",urgent:false,note:"分開裝訂"},
  ];
  save();
}

function renderFilters(){
  const used=[...new Set(data.map(h=>h.subject))];
  const opts=[{v:"all",l:"全部"},{v:"pending",l:"待完成"},{v:"ready",l:"已寫完待繳"},{v:"submitted",l:"已繳交"},...used.map(s=>({v:"s:"+s,l:s}))];
  document.getElementById("filterRow").innerHTML=opts.map(o=>`<button class="fpill${filter===o.v?" active":""}" onclick="setFilter('${o.v}')">${o.l}</button>`).join("");
}
function setFilter(f){filter=f;renderAll()}

function renderStats(){
  document.getElementById("sPending").textContent=data.filter(h=>h.status==="pending").length;
  document.getElementById("sUrgent").textContent=data.filter(h=>["pending","ready"].includes(h.status)&&h.due&&days(h.due)<=3).length;
  document.getElementById("sDone").textContent=data.filter(h=>h.status==="done"||h.status==="ready").length;
  document.getElementById("sSubmit").textContent=data.filter(h=>h.status==="submitted").length;
}

const STATUS_LABEL={pending:"待完成",ready:"已寫完待繳",done:"已完成",submitted:"已繳交"};
const STATUS_TAG={
  ready:`<span class="tag" style="background:#faf0e6;color:#8c6820">已寫完待繳</span>`,
  done:`<span class="tag tag-done">已完成</span>`,
  submitted:`<span class="tag tag-submitted">已繳交</span>`
};

function renderList(){
  const ORDER={pending:0,ready:1,done:2,submitted:3};
  let list=data.filter(h=>{
    if(filter==="pending")return h.status==="pending";
    if(filter==="ready")return h.status==="ready";
    if(filter==="done")return h.status==="done";
    if(filter==="submitted")return h.status==="submitted";
    if(filter.startsWith("s:"))return h.subject===filter.slice(2);
    return true;
  }).sort((a,b)=>{
    if(ORDER[a.status]!==ORDER[b.status])return ORDER[a.status]-ORDER[b.status];
    if(a.due&&b.due)return new Date(a.due)-new Date(b.due);
    return 0;
  });
  const el=document.getElementById("hwList");
  if(!list.length){el.innerHTML=`<div class="empty">目前沒有作業 🎉</div>`;return}

  // group headers
  let lastStatus="";
  const groupLabel={pending:"📝 待完成",ready:"📦 已寫完，待繳交",done:"✅ 已完成",submitted:"✅ 已繳交"};
  let html="";
  list.forEach(h=>{
    if(filter==="all"&&h.status!==lastStatus){
      lastStatus=h.status;
      html+=`<div style="font-size:11px;font-weight:600;color:var(--text2);margin:${html?"14px":0} 0 4px;letter-spacing:.3px">${groupLabel[h.status]||""}</div>`;
    }
    const d=h.due?days(h.due):999;
    const isSoon=d<=3&&["pending","ready"].includes(h.status)&&h.due;
    const isDone=["done","submitted"].includes(h.status);
    const chkClass=h.status==="submitted"?"submitted":h.status==="done"||h.status==="ready"?"done":"";
    const dueLine=h.due?`<span class="countdown${isSoon?" urgent-text":""}">${cdText(d,h.due)} · ${h.due}</span>`:"";
    html+=`<div class="hw-card${(h.urgent||isSoon)&&!isDone?" urgent-card":""}${h.status==="submitted"?" faded":""}">
      <div class="chk ${chkClass}${isAdmin?" clickable":""}" onclick="${isAdmin?`cycleStatus(${h.id})`:""}">${chkClass?"✓":""}</div>
      <div>
        <div class="hw-title${isDone?" strike":""}">${h.title}</div>
        <div class="hw-meta">
          <span class="tag ${sc(h.subject)}">${h.subject}</span>
          ${h.type==="report"?`<span class="tag tag-report">報告</span>`:""}
          ${h.urgent&&!isDone?`<span class="tag tag-urgent">緊急</span>`:""}
          ${STATUS_TAG[h.status]||""}
          ${dueLine}
        </div>
        ${h.note?`<div class="hw-note">${h.note}</div>`:""}
      </div>
      ${isAdmin?`<div class="hw-actions"><button class="iBtn" onclick="openEdit(${h.id})">✎</button><button class="iBtn del" onclick="del(${h.id})">✕</button></div>`:""}
    </div>`;
  });
  el.innerHTML=html;
  document.getElementById("updateTime").textContent="最後更新："+new Date().toLocaleString("zh-TW",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function cycleStatus(id){
  const h=data.find(x=>x.id===id);if(!h)return;
  h.status={pending:"ready",ready:"done",done:"submitted",submitted:"pending"}[h.status];
  save();renderAll();
}
function del(id){if(confirm("確定要刪除？")){data=data.filter(x=>x.id!==id);save();renderAll()}}
function openAdd(){editId=null;clearForm();document.getElementById("modalTitle").textContent="新增作業";document.getElementById("editOverlay").classList.add("show")}
function openEdit(id){
  const h=data.find(x=>x.id===id);if(!h)return;editId=id;
  document.getElementById("modalTitle").textContent="編輯作業";
  document.getElementById("fTitle").value=h.title;
  document.getElementById("fSubject").value=h.subject;
  document.getElementById("fDue").value=h.due||"";
  document.getElementById("fType").value=h.type;
  document.getElementById("fStatus").value=h.status;
  document.getElementById("fNote").value=h.note;
  document.getElementById("fUrgent").checked=h.urgent;
  document.getElementById("editOverlay").classList.add("show");
}
function closeEdit(){document.getElementById("editOverlay").classList.remove("show")}
function clearForm(){
  ["fTitle","fNote"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fSubject").value="";document.getElementById("fDue").value="";
  document.getElementById("fType").value="hw";document.getElementById("fStatus").value="pending";
  document.getElementById("fUrgent").checked=false;
}
function saveHw(){
  const title=document.getElementById("fTitle").value.trim();
  const subject=document.getElementById("fSubject").value;
  if(!title||!subject){alert("請填寫標題和科目");return}
  const hw={title,subject,due:document.getElementById("fDue").value,type:document.getElementById("fType").value,status:document.getElementById("fStatus").value,note:document.getElementById("fNote").value.trim(),urgent:document.getElementById("fUrgent").checked};
  if(editId){Object.assign(data.find(x=>x.id===editId),hw)}else{data.push({id:nid++,...hw})}
  save();closeEdit();renderAll();
}
function toggleAdmin(){if(isAdmin){isAdmin=false;updateAdminUI()}else{document.getElementById("loginOverlay").classList.add("show");setTimeout(()=>document.getElementById("passInput").focus(),100)}}
function doLogin(){if(document.getElementById("passInput").value===PASS){isAdmin=true;updateAdminUI();closeLogin()}else{document.getElementById("loginErr").style.display="block"}}
function closeLogin(){document.getElementById("loginOverlay").classList.remove("show");document.getElementById("passInput").value="";document.getElementById("loginErr").style.display="none"}
function updateAdminUI(){document.getElementById("lockBtn").textContent=isAdmin?"🔓 登出":"🔐 管理者登入";document.getElementById("addBtn").style.display=isAdmin?"":"none";document.getElementById("adminBar").style.display=isAdmin?"flex":"none";renderAll()}
function renderAll(){renderFilters();renderStats();renderList()}
